<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ThermaPace — Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0A0E1A;
      color: #e2e8f0;
      font-family: 'Inter', system-ui, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      text-align: center;
      padding: 2rem;
    }
    .container {
      max-width: 360px;
    }
    .icon {
      width: 64px;
      height: 64px;
      margin: 0 auto 1.5rem;
      background: rgba(6, 182, 212, 0.1);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      border: 2px solid rgba(6, 182, 212, 0.3);
    }
    .icon svg {
      width: 32px;
      height: 32px;
      stroke: #06B6D4;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    h1 {
      font-size: 1.25rem;
      font-weight: 800;
      margin-bottom: 0.5rem;
      color: #fff;
    }
    p {
      font-size: 0.875rem;
      color: #94a3b8;
      line-height: 1.6;
      margin-bottom: 1.5rem;
    }
    .btn {
      display: inline-block;
      padding: 0.75rem 1.5rem;
      background: #06B6D4;
      color: #0A0E1A;
      font-weight: 700;
      font-size: 0.875rem;
      border-radius: 0.5rem;
      border: none;
      cursor: pointer;
      text-decoration: none;
    }
    .btn:hover {
      background: #22D3EE;
    }
    .stale-warning {
      margin-top: 1rem;
      font-size: 0.75rem;
      color: #f59e0b;
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">
      <svg viewBox="0 0 24 24">
        <path d="M18 10h-4V6l-4 4"/>
        <path d="M14 10a4 4 0 1 1-8 0"/>
        <line x1="12" y1="2" x2="12" y2="4"/>
        <path d="M20.2 20.2 18 18"/>
        <path d="M3.8 20.2 6 18"/>
      </svg>
    </div>
    <h1>You're Offline</h1>
    <p>ThermaPace needs an internet connection to fetch current weather data and provide accurate training recommendations.</p>
    <button class="btn" onclick="location.reload()">Try Again</button>
    <p class="stale-warning">Last-known conditions may be shown if previously cached.</p>
  </div>
</body>
</html>
